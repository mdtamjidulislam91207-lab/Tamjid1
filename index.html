    h+='<div class="admin-sec"><h4>🔗 Referral</h4><input class="admin-inp" id="admRt" value="'+(AD.rt||'')+'" placeholder="Title"><input class="admin-inp" type="number" id="admRr" value="'+(AD.rr||5)+'" placeholder="Reward"><input class="admin-inp" id="admRl" value="'+(AD.rl||'')+'" placeholder="Custom Link"><button class="admin-btn a-blue" onclick="sAdmRef()">💾 Save</button></div>';
    h+='<div class="admin-sec"><h4>💳 Icons</h4><input class="admin-inp" id="admBi" value="'+(AD.bi||'')+'" placeholder="bKash URL"><input class="admin-inp" id="admNi" value="'+(AD.ni||'')+'" placeholder="Nagad URL"><button class="admin-btn a-blue" onclick="sAdmIc()">💾 Save</button></div>';
    h+='<div class="admin-sec"><h4>🆘 Support</h4><input class="admin-inp" id="admSupportLink" value="'+(AD.supportLink||'')+'" placeholder="Support Link"><input class="admin-inp" id="admVideoURL" value="'+(AD.videoURL||'')+'" placeholder="Video URL"><button class="admin-btn a-blue" onclick="sAdmSup()">💾 Save</button></div>';
    h+='<div class="admin-sec"><h4>💵 Withdrawals</h4>';wd.forEach((w,i)=>{h+='<div style="background:#0a0a1a;padding:8px;border-radius:4px;margin-bottom:4px;display:flex;justify-content:space-between;"><div><b>'+(w.uid||'').substring(0,6)+'</b> - '+w.am+' Tk ('+w.mt+')<br><small>'+w.ac+'</small></div><div><span style="padding:2px 8px;border-radius:8px;font-size:8px;background:'+(w.st==='pending'?'#FDCB6E':w.st==='approved'?'#00B894':'#FF7675')+';">'+w.st+'</span>'+(w.st==='pending'?' <button class="admin-btn a-green" style="padding:2px 5px;font-size:8px;" onclick="admApWd('+i+')">✅</button> <button class="admin-btn a-red" style="padding:2px 5px;font-size:8px;" onclick="admRjWd('+i+')">❌</button>':'')+'</div></div>';});h+='</div>';
    h+='<div class="admin-sec"><h4>⚙️ Settings</h4><input class="admin-inp" type="number" id="admAa" value="'+(AD.ar?AD.ar.a:10)+'" placeholder="Ads Required"><input class="admin-inp" type="number" id="admAr" value="'+(AD.ar?AD.ar.r:3)+'" placeholder="Refs Required"><input class="admin-inp" type="number" id="admMw" value="'+(AD.mw||50)+'" placeholder="Min Withdraw"><button class="admin-btn a-blue" onclick="sAdmSet()">💾 Save</button></div>';
    h+='<div class="admin-sec"><h4>🔒 Password</h4><input class="admin-inp" type="password" id="admNewPass" placeholder="New Password"><button class="admin-btn a-red" onclick="chAdmPass()">🔑 Change</button></div>';
    h+='<div class="admin-sec"><h4>📨 Broadcast</h4><textarea class="admin-inp" id="admBm" placeholder="Message..."></textarea><button class="admin-btn a-blue" onclick="sAdmBC()">📤 Send</button></div>';
    document.getElementById('adminContent').innerHTML=h;
    let sbh='';(AD.sb||[]).forEach((sb,i)=>{sbh+='<div style="background:#0a0a1a;padding:8px;border-radius:4px;margin-bottom:4px;"><b>#'+(i+1)+'</b><br><input class="admin-inp" id="admSbt'+i+'" value="'+(sb.title||'')+'" placeholder="Title"><input class="admin-inp" id="admSbl'+i+'" value="'+(sb.link||'')+'" placeholder="Link"><input class="admin-inp" type="number" id="admSba'+i+'" value="'+(sb.amount||0)+'" step="0.01"><input class="admin-inp" type="number" id="admSbm'+i+'" value="'+(sb.maxClaims||1)+'" placeholder="Max Claims"><button class="admin-btn a-red" style="padding:2px 5px;font-size:8px;" onclick="admRmSb('+i+')">🗑</button></div>';});document.getElementById('admSbList').innerHTML=sbh;}
    window.admAp=function(id){const u=JSON.parse(localStorage.getItem(K+'user_'+id));if(u){u.ap=!0;u.vip=!0;localStorage.setItem(K+'user_'+id,JSON.stringify(u));}U=loadU();refreshUI();renderWallet();refreshAdmin();};
    window.admAddBal=function(id){const amt=prompt('Enter amount (Tk):');if(!amt||isNaN(amt)||parseFloat(amt)<=0)return;const u=JSON.parse(localStorage.getItem(K+'user_'+id));if(u){u.bal=(u.bal||0)+parseFloat(amt);u.tx=u.tx||[];u.tx.unshift({ty:'credit',am:parseFloat(amt),ds:'Admin added',dt:new Date().toISOString()});localStorage.setItem(K+'user_'+id,JSON.stringify(u));}U=loadU();refreshUI();renderWallet();refreshAdmin();alert('✅ Added '+amt+' Tk!');};
    window.admBlk=function(id){const u=JSON.parse(localStorage.getItem(K+'user_'+id));if(u){u.ap=!1;u.vip=!1;localStorage.setItem(K+'user_'+id,JSON.stringify(u));}U=loadU();refreshUI();renderWallet();refreshAdmin();};
    function sAdmAd(){AD.adT=document.getElementById('admAdT').value;AD.adS=document.getElementById('admAdS').value;AD.adLm=parseInt(document.getElementById('admAdLm').value)||10;AD.adE=parseFloat(document.getElementById('admAdE').value)||1;AD.ccs=parseInt(document.getElementById('admCcs').value)||30;AD.adL=[document.getElementById('admAdL1').value,document.getElementById('admAdL2').value,document.getElementById('admAdL3').value];AD.pc=document.getElementById('admPc').value;saveAD();renderAd();alert('✅ Saved!');}window.sAdmAd=sAdmAd;
    function sAdmTsk(){AD.jt=AD.jt||[{},{},{},{}];for(let i=0;i<4;i++){AD.jt[i]={t:document.getElementById('admTt'+i)?.value||'',l:document.getElementById('admTl'+i)?.value||'',r:parseInt(document.getElementById('admTr'+i)?.value)||0};}saveAD();renderTasks();alert('✅ Saved!');}window.sAdmTsk=sAdmTsk;
    function sAdmBon(){AD.db={en:document.getElementById('admDbEn').checked,am:parseFloat(document.getElementById('admDbAm').value)||0.25,im:parseInt(document.getElementById('admDbIm').value)||5,link:document.getElementById('admDbLk').value};saveAD();renderBonus();alert('✅ Saved!');}window.sAdmBon=sAdmBon;
    function sAdmSpin(){AD.spinRewards=[];for(let i=0;i<7;i++){AD.spinRewards.push(parseFloat(document.getElementById('admSpin'+i).value)||0.10);}saveAD();renderSpinWheel();alert('✅ Spin rewards saved!');}window.sAdmSpin=sAdmSpin;
    function addAdmSb(){AD.sb=AD.sb||[];AD.sb.push({title:'Bonus',link:'',amount:1,maxClaims:1});saveAD();refreshAdmin();}window.addAdmSb=addAdmSb;
    window.admRmSb=function(i){AD.sb.splice(i,1);saveAD();refreshAdmin();};
    function sAdmSb(){AD.sb=AD.sb||[];const c=AD.sb.length;for(let i=0;i<c;i++){AD.sb[i]={title:document.getElementById('admSbt'+i)?.value||'',link:document.getElementById('admSbl'+i)?.value||'',amount:parseFloat(document.getElementById('admSba'+i)?.value)||0,maxClaims:parseInt(document.getElementById('admSbm'+i)?.value)||1};}saveAD();renderBonus();alert('✅ Saved!');}window.sAdmSb=sAdmSb;
    function sAdmRef(){AD.rt=document.getElementById('admRt').value;AD.rr=parseInt(document.getElementById('admRr').value)||5;AD.rl=document.getElementById('admRl').value;saveAD();refreshUI();alert('✅ Saved!');}window.sAdmRef=sAdmRef;
    function sAdmIc(){AD.bi=document.getElementById('admBi').value;AD.ni=document.getElementById('admNi').value;saveAD();renderWithdraw();alert('✅ Saved!');}window.sAdmIc=sAdmIc;
    function sAdmSup(){AD.supportLink=document.getElementById('admSupportLink').value;AD.videoURL=document.getElementById('admVideoURL').value;saveAD();refreshUI();alert('✅ Saved!');}window.sAdmSup=sAdmSup;
    function sAdmSet(){AD.ar={a:parseInt(document.getElementById('admAa').value)||10,r:parseInt(document.getElementById('admAr').value)||3};AD.mw=parseInt(document.getElementById('admMw').value)||50;saveAD();renderWithdraw();alert('✅ Saved!');}window.sAdmSet=sAdmSet;
    window.admApWd=function(i){const wd=gWds();if(wd[i]){wd[i].st='approved';saveWds(wd);const u=JSON.parse(localStorage.getItem(K+'user_'+wd[i].uid));if(u&&u.tx){const tx=u.tx.find(t=>t.st==='pending'&&t.ty==='debit'&&t.am===wd[i].am);if(tx){tx.st='approved';localStorage.setItem(K+'user_'+wd[i].uid,JSON.stringify(u));}}refreshAdmin();U=loadU();renderTx();}};
    window.admRjWd=function(i){const wd=gWds();if(wd[i]&&wd[i].st==='pending'){wd[i].st='rejected';saveWds(wd);const u=JSON.parse(localStorage.getItem(K+'user_'+wd[i].uid));if(u){u.bal=(u.bal||0)+wd[i].am;u.tx=u.tx||[];const tx=u.tx.find(t=>t.st==='pending'&&t.ty==='debit'&&t.am===wd[i].am);if(tx){tx.st='rejected';}u.tx.unshift({ty:'credit',am:wd[i].am,ds:'Refund: '+wd[i].mt.toUpperCase(),dt:new Date().toISOString()});localStorage.setItem(K+'user_'+wd[i].uid,JSON.stringify(u));}refreshAdmin();U=loadU();renderTx();renderWallet();alert('❌ Rejected! '+wd[i].am+' Tk refunded.');}};
    function chAdmPass(){const np=document.getElementById('admNewPass').value.trim();if(!np||np.length<3){alert('Too short!');return;}localStorage.setItem(K+'admin_pass',np);document.getElementById('admNewPass').value='';alert('✅ Changed!');}window.chAdmPass=chAdmPass;
    function sAdmBC(){const m=document.getElementById('admBm').value.trim();if(!m){alert('Write!');return;}AD.ms=AD.ms||[];AD.ms.push({text:m,date:new Date().toISOString()});saveAD();document.getElementById('admBm').value='';renderInbox();alert('✅ Sent!');}window.sAdmBC=sAdmBC;

    // Init
    AD=loadAD();const uid=localStorage.getItem(K+'uid');
    if(uid){U=loadU();if(U){showApp();initApp();}else{renderAuth('login');}}else{renderAuth('login');}
    document.addEventListener('focusin',()=>{inf=!0;});document.addEventListener('focusout',()=>{setTimeout(()=>inf=!1,300);});
    </script>
